spring:
  application:
    name: docuai-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docuai}
    Username: postgres
    password:
    #username: ${DB_USER:postgres}
    #password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

security:
  jwt:
    private-key: ${SECURITY_JWT_PRIVATE_KEY:}
    public-key: ${SECURITY_JWT_PUBLIC_KEY:}
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 604800
  aes:
    secret: ${SECURITY_AES_SECRET:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    source: documents-source
    reference: documents-reference
    generated: documents-generated
  presigned-url-expiry-minutes: 15

extraction:
  service-url: ${EXTRACTOR_SERVICE_URL:http://localhost:8001}
  timeout-seconds: 60
  use-mock: ${EXTRACTOR_USE_MOCK:false}

ai:
  default-provider: OPENAI
  timeout-seconds: 30
  max-retries: 3

resilience4j:
  retry:
    instances:
      ai-call:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      ai-call:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
  timelimiter:
    instances:
      ai-call:
        timeout-duration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.docuai: INFO
    org.springframework.security: INFO
